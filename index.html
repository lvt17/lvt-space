<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/space-logo.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="color-scheme" content="light dark" />

  <!-- SEO Meta -->
  <title>Lvt Space — All-in-One Workspace Suite</title>
  <meta name="description"
    content="Manage tasks, track income, organize checklists & visualize workflows — all in one beautiful, theme-aware platform. Free for freelancers, students & teams." />
  <meta name="keywords"
    content="task management, workspace, productivity, freelancer tools, income tracking, checklist, kanban, project management, lvtspace" />
  <meta name="author" content="Lieu Vinh Toan" />
  <meta name="robots" content="index, follow" />
  <link rel="canonical" href="https://lvtspace.me" />

  <!-- Open Graph / Facebook -->
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://lvtspace.me" />
  <meta property="og:title" content="Lvt Space — All-in-One Workspace Suite" />
  <meta property="og:description"
    content="Manage tasks, track income, organize checklists & visualize workflows — all in one beautiful platform." />
  <meta property="og:site_name" content="Lvt Space" />

  <!-- Twitter -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Lvt Space — All-in-One Workspace Suite" />
  <meta name="twitter:description"
    content="Manage tasks, track income, organize checklists & visualize workflows — all in one beautiful platform." />

  <!-- Structured Data (JSON-LD) -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebApplication",
    "name": "Lvt Space",
    "url": "https://lvtspace.me",
    "description": "All-in-one workspace suite for task management, income tracking, and productivity.",
    "applicationCategory": "ProductivityApplication",
    "operatingSystem": "Web",
    "offers": {
      "@type": "Offer",
      "price": "0",
      "priceCurrency": "USD"
    },
    "author": {
      "@type": "Person",
      "name": "Lieu Vinh Toan",
      "url": "https://github.com/lvt17"
    }
  }
  </script>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet" />
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
